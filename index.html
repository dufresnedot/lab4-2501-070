<div id="box" class="box">
    <div id="login">
        <h3>登录</h3>
        <input id="u" placeholder="用户名">
        <input id="p" type="password" placeholder="密码">
        <button onclick="login()">登录</button>
        <p onclick="showReg()">去注册</p >
    </div>

    <div id="reg">
        <h3>注册</h3>
        <input id="ru" placeholder="用户名">
        <input id="rp" type="password" placeholder="密码">
        <button onclick="reg()">注册</button>
        <p onclick="showLogin()">去登录</p >
    </div>
</div>

<script>
function showLogin(){
    document.getElementById("box").style.display="block";
    document.getElementById("login").style.display="block";
    document.getElementById("reg").style.display="none";
}

function showReg(){
    document.getElementById("login").style.display="none";
    document.getElementById("reg").style.display="block";
}

function reg(){
    localStorage.setItem("u",document.getElementById("ru").value);
    localStorage.setItem("p",document.getElementById("rp").value);
    alert("注册成功");
    showLogin();
}

function login(){
    if(
        document.getElementById("u").value==localStorage.getItem("u") &&
        document.getElementById("p").value==localStorage.getItem("p")
    ){
        alert("登录成功");
    }else{
        alert("错误");
    }
}
</script>
